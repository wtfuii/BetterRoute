name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BetterRoute.sln

      - name: Build
        run: dotnet build BetterRoute.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test BetterRoute.Tests/BetterRoute.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Publish sample app
        run: |
          REPO_NAME=${{ github.event.repository.name }}
          dotnet publish BetterRoute.Sample/BetterRoute.Sample.csproj \
            --configuration Release \
            --output publish \
            -p:StaticWebAssetBasePath="/${REPO_NAME}/"

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Add 404 fallback for SPA routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload artifact for deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
