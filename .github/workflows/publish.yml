name: Publish to NuGet

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # v1.0.0, v1.0.0-preview1, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore BetterRoute.sln

      - name: Build
        run: dotnet build BetterRoute.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test BetterRoute.Tests/BetterRoute.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack BetterRoute/BetterRoute.csproj --no-build --configuration Release --output packages

      - name: Push to NuGet
        run: dotnet nuget push packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
