name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for NuGet Trusted Publishing (OIDC)
    env:
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version
        run: |
          # From release: strip 'v' from tag. From workflow_dispatch: use input directly.
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore BetterRoute.sln

      - name: Build
        run: >
          dotnet build BetterRoute.sln --no-restore --configuration Release
          -p:Version=${{ env.VERSION }}
          -p:AssemblyVersion=${{ env.VERSION }}
          -p:FileVersion=${{ env.VERSION }}

      - name: Run tests
        run: dotnet test BetterRoute.Tests/BetterRoute.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Pack
        run: >
          dotnet pack BetterRoute/BetterRoute.csproj --no-build --configuration Release --output packages
          -p:Version=${{ env.VERSION }}
          -p:AssemblyVersion=${{ env.VERSION }}
          -p:FileVersion=${{ env.VERSION }}

      - name: NuGet login (OIDC → temp API key)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push packages/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
